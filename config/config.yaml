# config/config.yaml
model:
  name: gemma4:e2b          # gemma4:e4b for higher quality, any ollama model works
  temperature: 0.7
  context_window: 128000    # set to your model's actual context window (check: ollama show <model>)

debate:
  max_rounds: 5             # agents now hold positions more firmly; 5 rounds surfaces the key arguments
  max_tokens_per_response: 250
  context_summary_threshold: 0.50
