# config/config.yaml
model:
  name: gemma4:e2b          # gemma4:e4b for higher quality, any ollama model works
  temperature: 0.7
  context_window: 4096      # gemma4:e2b hard limit — increase for larger models (e4b: 8192+)

debate:
  max_rounds: 50            # safety valve — debate runs as long as needed
  max_tokens_per_response: 250
  context_summary_threshold: 0.50
