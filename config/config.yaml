# config/config.yaml
model:
  name: gemma4:e4b          # gemma4:e2b for lower VRAM, any ollama model works
  temperature: 0.7
  context_window: 128000

debate:
  max_rounds: 50            # safety valve — debate runs as long as needed
  max_tokens_per_response: 250
  context_summary_threshold: 0.75
